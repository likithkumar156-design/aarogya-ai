<!DOCTYPE html>
<html>
<head>
    <title>IVRS Test - Aarogya AI</title>
    <style>
        body { font-family: Arial; padding: 40px; background: #1a1a1a; color: #fff; }
        .container { max-width: 600px; margin: 0 auto; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; 
                 background: #4CAF50; color: white; border: none; border-radius: 5px; }
        button:hover { background: #45a049; }
        #response { margin-top: 20px; padding: 20px; background: #2a2a2a; 
                    border-radius: 5px; white-space: pre-wrap; }
        h1 { color: #4CAF50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Aarogya AI - IVRS Test</h1>
        <p>Test your IVRS system without making a phone call:</p>
        
        <button onclick="testIVRS()">📞 Start IVRS Call</button>
        <button onclick="testWithDigit('1')">Press 1 (Hindi)</button>
        <button onclick="testWithDigit('2')">Press 2 (English)</button>
        
        <div id="response"></div>
    </div>

    <script>
        async function testIVRS() {
            const response = await fetch('/api/ivrs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            const text = await response.text();
            document.getElementById('response').textContent = text;
        }

        async function testWithDigit(digit) {
            const response = await fetch('/api/ivrs?step=lang', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `Digits=${digit}`
            });
            const text = await response.text();
            document.getElementById('response').textContent = text;
        }
    </script>
</body>
</html>
